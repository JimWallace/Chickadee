# Child SwiftLint config for Tests/. Inherits the repo-root .swiftlint.yml
# and only overrides what differs for test code.
#
# CLAUDE.md exempts test code from the no-force-unwrap rule: `XCTUnwrap`
# is the idiomatic alternative but plenty of existing test code uses `!`
# on values known to be present in fixtures. Disabling the rule here
# avoids a sweeping rewrite of test code that adds no real safety.

parent_config: ../.swiftlint.yml

disabled_rules:
  - force_unwrapping
  # `non_optional_string_data_conversion` flags
  # `<string>.data(using: .utf8)` and suggests `Data(<string>.utf8)`.
  # All 29 violations are in test fixtures with controlled multi-line
  # `"""…"""` literals where `.data(using: .utf8)!` is the standard
  # idiom.  The transformation would require wrapping every fixture in
  # `Data(... .utf8)` for negligible benefit.  The companion
  # force_unwrapping exemption above covers the same reasoning.
  - non_optional_string_data_conversion
