# nginx configuration for Chickadee running in Docker Compose.
#
# The upstream name "server" matches the service name in docker-compose.yml.
# Mount this file into the nginx container:
#   - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/chickadee.conf:ro
#
# HTTP-only (default). To add HTTPS with Let's Encrypt:
#   1. Run certbot to obtain a certificate (see deploy/README.md)
#   2. Uncomment the HTTPS server block below
#   3. Uncomment "return 301 https://$host$request_uri;" in the HTTP block
#   4. Update your domain name in both server blocks
#   5. docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name _;   # replace _ with your domain name in production

    client_max_body_size 50m;

    # Uncomment to redirect all HTTP → HTTPS once certbot is set up:
    # return 301 https://$host$request_uri;

    # Let's Encrypt ACME HTTP-01 challenge (needed for certbot renewal).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://server:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Required for JupyterLite / WebAssembly (SharedArrayBuffer).
        # Chickadee sets these headers; nginx re-applies them so they
        # survive the proxy hop correctly.
        proxy_hide_header  Cross-Origin-Opener-Policy;
        proxy_hide_header  Cross-Origin-Embedder-Policy;
        add_header         Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header         Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location /health {
        proxy_pass  http://server:8080/health;
        access_log  off;
    }
}

