name: Test Isolation (3x repeat)

# Runs the parallel-most test targets three times in a row whenever a PR
# touches Tests/.  Surfaces ordering-dependent flakes (shared temp paths,
# env-var globals, etc.) that the default single-run swift-tests.yml job
# would only catch intermittently.
#
# Active during the XCTest → Swift Testing migration (Phases 0–4).  After
# Phase 4 lands and the codebase is single-framework, delete this workflow
# (the standard swift-tests.yml runs already exercise parallelism).

on:
  pull_request:
    paths:
      - "Tests/**"
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"

jobs:
  repeat-core-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v5
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install system test dependencies
        run: |
          for i in 1 2 3; do
            apt-get update -qq && apt-get install -y --no-install-recommends zip unzip && break
            echo "apt-get failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run CoreTests + APITests three times in a row
        run: |
          for i in 1 2 3; do
            echo "::group::Iteration $i of 3"
            swift test --parallel --filter CoreTests --filter APITests
            echo "::endgroup::"
          done
