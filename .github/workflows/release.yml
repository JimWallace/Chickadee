name: Create GitHub Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.51)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"

          # Pull the section for this version out of CHANGELOG.md.
          # Section header format: ## [X.Y.Z] - YYYY-MM-DD
          NOTES=$(awk \
            -v ver="$VERSION" \
            'BEGIN{found=0}
             /^## \[/{
               if (found) exit
               if (index($0, "["ver"]")) found=1
               next
             }
             found{print}' \
            CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi

          # Write multi-line output safely
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Chickadee ${{ steps.tag.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
          draft: false
          prerelease: false
