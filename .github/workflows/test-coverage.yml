name: Test Coverage

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends zip unzip curl

      - name: Run tests with coverage
        run: swift test --enable-code-coverage

      - name: Export coverage to lcov
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -type f)
          XCTEST=$(find "$BIN" -name 'ChickadeePackageTests.xctest' -type f)
          llvm-cov export \
            -format=lcov \
            -instr-profile="$PROFDATA" \
            "$XCTEST" \
            -ignore-filename-regex='.build/|Tests/' \
            > coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
