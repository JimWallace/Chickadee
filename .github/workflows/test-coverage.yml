name: Nightly Clean Build & Coverage

# This is the project's clean-build canary.  It compiles the whole package
# from scratch every night: it caches only `.build/checkouts` (vendored
# dependency *source*), never the compiled `.build/<triple>` artifacts, and
# uses a different cache-key namespace (`-spm-`) than swift-tests.yml's
# incremental `build` job (`-build-`).  So it catches any break that the
# per-PR incremental build cache (restore-keys + git-restore-mtime) could
# mask via a stale object that never got recompiled.
#
# DO NOT add compiled-artifact caching here (the swift-tests.yml `.build`
# cache, `--skip-build`, etc.) — that would defeat the canary's purpose.
# On failure the `report-failure` job opens/updates a tracking issue.

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC is 2:00 AM in Toronto during daylight saving time.
    - cron: "0 6 * * *"

jobs:
  coverage:
    runs-on: ubuntu-latest
    container:
      image: swift:6.3-jammy
      options: --privileged
    env:
      MIN_COVERAGE_PERCENT: "60.0"

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v5
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install system dependencies
        run: |
          for i in 1 2 3; do
            apt-get update -qq && apt-get install -y --no-install-recommends zip unzip curl file && break
            echo "apt-get failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run tests with coverage
        run: swift test --enable-code-coverage

      - name: Export coverage to lcov
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -type f)
          XCTEST=$(find "$BIN" -name 'ChickadeePackageTests.xctest' -type f)
          llvm-cov export \
            -format=lcov \
            -instr-profile="$PROFDATA" \
            "$XCTEST" \
            -ignore-filename-regex='.build/|Tests/' \
            > coverage.lcov

      - name: Enforce coverage floor
        id: enforce_coverage_floor
        run: |
          COVERAGE_PERCENT=$(awk '
            BEGIN { hit = 0; found = 0 }
            /^DA:/ {
              split($0, parts, ",")
              found += 1
              if ((parts[2] + 0) > 0) {
                hit += 1
              }
            }
            END {
              if (found == 0) {
                print "0.00"
              } else {
                printf "%.2f", (hit / found) * 100
              }
            }
          ' coverage.lcov)

          echo "Coverage: ${COVERAGE_PERCENT}%"
          echo "Minimum required: ${MIN_COVERAGE_PERCENT}%"
          echo "coverage_percent=${COVERAGE_PERCENT}" >> "$GITHUB_OUTPUT"

          awk -v actual="$COVERAGE_PERCENT" -v minimum="$MIN_COVERAGE_PERCENT" '
            BEGIN {
              if (actual + 0 < minimum + 0) {
                printf "Coverage %.2f%% is below required floor %.2f%%\n", actual + 0, minimum + 0
                exit 1
              }
            }
          '

      - name: Write coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            echo "- Total line coverage: ${{ steps.enforce_coverage_floor.outputs.coverage_percent }}%"
            echo "- Required floor: ${MIN_COVERAGE_PERCENT}%"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Surface a failed nightly clean build as an actionable, deduplicated
  # GitHub issue instead of a red run that no one watches.  Runs on the host
  # (not the swift container) so `gh` is available.
  report-failure:
    runs-on: ubuntu-latest
    needs: coverage
    if: ${{ always() && needs.coverage.result == 'failure' }}
    permissions:
      issues: write
      contents: read

    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Nightly clean build failing"
          label="nightly-clean-build"

          # Ensure the label exists (idempotent).
          gh label create "$label" --color B60205 \
            --description "Nightly from-scratch clean build canary failed" \
            --force >/dev/null 2>&1 || true

          body=$(cat <<EOF
          The nightly from-scratch clean build (\`test-coverage.yml\`) failed.

          **Run:** $RUN_URL

          This is the clean-build canary — it compiles the whole package from
          scratch with no compiled-artifact cache, so no incremental build
          cache can mask the result. A failure here means one of:

          - a genuine compile break on a clean tree,
          - a test failure, or
          - the coverage floor was not met.

          Check the run to see which step failed. If the per-PR jobs in
          \`swift-tests.yml\` were green but this is red, suspect a stale
          object slipping past the incremental \`.build\` cache and prefer a
          clean rebuild while investigating.
          EOF
          )

          existing=$(gh issue list --repo "$REPO" --state open --label "$label" \
            --search "$title in:title" --json number,title \
            --jq "map(select(.title==\"$title\")) | (.[0].number // empty)")

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
            echo "Commented on existing issue #$existing"
          else
            gh issue create --repo "$REPO" --title "$title" --label "$label" --body "$body"
          fi
