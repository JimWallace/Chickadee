name: Build and Push Docker Image

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE: ghcr.io/jimwallace/chickadee

jobs:
  # ── Build & push Docker image ─────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # :sha-<short-commit> on every push (immutable, good for rollback)
            type=sha,prefix=sha-
            # :v0.4.1 etc. on version tags
            type=semver,pattern={{version}}

      - name: Build (and push on main/tags)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          # Always load locally so Trivy can scan it; push separately below.
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit layer cache: dependency fetch is cached across runs
          # unless Package.swift or Package.resolved changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
