name: Worker Tests

on:
  workflow_dispatch:
  schedule:
    # 06:30 UTC is 2:30 AM in Toronto during daylight saving time.
    - cron: "30 6 * * *"

jobs:
  worker-tests-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run stable worker test targets
        run: swift test --filter 'ScriptInvocationTests|WorkerRequestSignerTests|WorkerDaemonTests|RunnerWorkDirTests'

  worker-tests-runner-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run core runner behavior tests
        run: |
          swift test \
            --filter 'WorkerTests.WorkerTests' \
            --skip 'WorkerTests.WorkerTests/testScriptTimesOut' \
            --skip 'WorkerTests.WorkerTests/testScriptTimeoutReapsBackgroundChildProcess' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerExitZero' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerExitOne' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerCapturesStdout' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerCapturesStderr' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerTimesOut' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerTimeoutReapsBackgroundChildProcess' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerWorkDir' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerBlocksNetworkAccess'

  worker-tests-timeouts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run timeout and sandbox-focused worker tests
        run: swift test --filter 'testScriptTimesOut|testScriptTimeoutReaps|testSandboxedRunner'
