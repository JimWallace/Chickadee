name: Worker Tests

on:
  workflow_dispatch:
  schedule:
    # 06:30 UTC is 2:30 AM in Toronto during daylight saving time.
    - cron: "30 6 * * *"

jobs:
  worker-tests:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Run WorkerTests
        run: swift test --filter WorkerTests
