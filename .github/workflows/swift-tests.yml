name: Swift Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # noble (Ubuntu 24.04) rather than jammy (22.04) because SwiftLintBinary
    # 0.63.2 — shipped by the SwiftLintPlugins package and downloaded on
    # demand — is linked against GLIBC 2.38, which jammy's glibc 2.35 cannot
    # satisfy.  The test/build jobs below stay on jammy because they don't
    # invoke the swiftlint plugin.  Re-unify when SwiftLintBinary publishes
    # a jammy-compatible release or when the project moves all jobs to noble.
    container:
      image: swift:6.3-noble

    steps:
      - uses: actions/checkout@v6

      - name: Compute SPM cache key
        id: spm-cache-key
        run: echo "value=$(sha256sum Package.resolved | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM checkouts
        uses: actions/cache@v5
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ steps.spm-cache-key.outputs.value }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Check formatting
        run: scripts/lint.sh

      - name: Run SwiftLint
        run: scripts/swiftlint.sh

      - name: Block new XCTest imports
        run: scripts/no-new-xctest.sh

  # Single shared compile of the whole package + all test targets.  The
  # resulting `.build/` tree is cached and reused by every test job below
  # via `swift test --skip-build`, replacing five from-scratch compiles
  # (~40 min of wall-clock) with one (#523).
  #
  # Cache key combines the toolchain (swift --version) with a content hash
  # of the source + manifest.  `restore-keys` lets a cache miss restore the
  # most recent prior `.build/` for the same toolchain so the compile is
  # incremental rather than cold — keeping a miss no slower than today.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: swift:6.3-jammy

    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain cache key
        id: toolchain
        run: echo "key=$(swift --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-

      # Skip only on an exact cache hit: the restored artifacts already match
      # this source tree, and a bare `swift build` would needlessly recompile
      # because `actions/checkout` resets source mtimes ahead of the cached
      # objects.  On a restore-keys partial hit `cache-hit` is false, so we
      # still run an incremental build over the older `.build/`.
      - name: Build all targets and tests
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: swift build --build-tests

  core-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain cache key
        id: toolchain
        run: echo "key=$(swift --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}

      - name: Run CoreTests
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" = "true" ]; then
            swift test --skip-build --parallel --filter CoreTests
          else
            swift test --parallel --filter CoreTests
          fi

  api-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain cache key
        id: toolchain
        run: echo "key=$(swift --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}

      - name: Install system test dependencies
        run: |
          for i in 1 2 3; do
            apt-get update -qq && apt-get install -y --no-install-recommends zip unzip && break
            echo "apt-get failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run APITests
        # Swift Testing schedules many class-suite instances in parallel
        # regardless of the swift test --parallel flag.  Each test app
        # opens its own SQLite connection pool with one connection per
        # EventLoop, and at unbounded parallelism the combined pool
        # requests time out (AsyncKit "Connection request timed out").
        # `SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=4` caps Swift
        # Testing's internal scheduler to four in-flight tests at a
        # time — enough headroom for the connection pool to keep up,
        # with most of the parallelism speedup preserved.
        env:
          SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH: "4"
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" = "true" ]; then
            swift test --skip-build --filter APITests
          else
            swift test --filter APITests
          fi

  api-tests-postgres:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    container:
      image: swift:6.3-jammy
      options: --privileged
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chickadee_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d chickadee_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_BACKEND: postgres
      TEST_DATABASE_HOST: postgres
      TEST_DATABASE_PORT: "5432"
      TEST_DATABASE_NAME: chickadee_test
      TEST_DATABASE_USER: postgres
      TEST_DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain cache key
        id: toolchain
        run: echo "key=$(swift --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}

      - name: Install system test dependencies
        run: |
          for i in 1 2 3; do
            apt-get update -qq && apt-get install -y --no-install-recommends zip unzip && break
            echo "apt-get failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Run APITests against PostgreSQL
        # Swift Testing schedules many class-suite instances in parallel
        # regardless of the swift test --parallel flag, and during the
        # FluentKit migration step each Application opens multiple
        # Postgres connections briefly.  At unbounded parallelism that
        # pushes past the default 100-connection cap.
        # `SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH=4` caps Swift
        # Testing's internal scheduler to four in-flight tests at a
        # time — well under the connection cap, with most of the
        # parallelism speedup preserved.
        env:
          SWT_EXPERIMENTAL_MAXIMUM_PARALLELIZATION_WIDTH: "4"
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" = "true" ]; then
            swift test --skip-build --filter APITests
          else
            swift test --filter APITests
          fi

  browser-runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Run browser runner execution tests
        run: node --test Tests/BrowserRunnerJSTests/*.mjs

  worker-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    # Sequential to avoid MockURLProtocol global-state races between
    # ReporterTests + JobPollerTests (both use the same process-wide
    # mock URLProtocol).  withMockURLProtocolLock serializes within
    # the test process; --parallel would just have the runner schedule
    # them across multiple xctest binaries that don't share the lock.
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain cache key
        id: toolchain
        run: echo "key=$(swift --version | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore build artifacts
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ steps.toolchain.outputs.key }}-${{ hashFiles('Package.resolved', 'Package.swift', 'Sources/**', 'Tests/**') }}

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run WorkerTests
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" = "true" ]; then
            swift test --skip-build --filter WorkerTests
          else
            swift test --filter WorkerTests
          fi
