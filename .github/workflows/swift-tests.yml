name: Swift Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Run CoreTests
        run: swift test --parallel --filter CoreTests

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install system test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends zip unzip

      - name: Run APITests
        run: swift test --filter APITests

  api-tests-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: swift:6.3-jammy
      options: --privileged
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chickadee_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d chickadee_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_BACKEND: postgres
      TEST_DATABASE_HOST: postgres
      TEST_DATABASE_PORT: "5432"
      TEST_DATABASE_NAME: chickadee_test
      TEST_DATABASE_USER: postgres
      TEST_DATABASE_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install system test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends zip unzip

      - name: Run APITests against PostgreSQL
        run: swift test --filter APITests

  browser-runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run browser runner execution tests
        run: node --test Tests/BrowserRunnerJSTests/*.mjs

  worker-tests-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run stable worker test targets
        run: swift test --filter 'ScriptInvocationTests|WorkerRequestSignerTests|WorkerDaemonTests|RunnerWorkDirTests'

  worker-tests-runner-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run core runner behavior tests
        run: |
          swift test \
            --filter 'WorkerTests.WorkerTests' \
            --skip 'WorkerTests.WorkerTests/testScriptTimesOut' \
            --skip 'WorkerTests.WorkerTests/testScriptTimeoutReapsBackgroundChildProcess' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerExitZero' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerExitOne' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerCapturesStdout' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerCapturesStderr' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerTimesOut' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerTimeoutReapsBackgroundChildProcess' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerWorkDir' \
            --skip 'WorkerTests.WorkerTests/testSandboxedRunnerBlocksNetworkAccess'

  worker-tests-timeouts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: .build/checkouts
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install worker test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends file

      - name: Run timeout and sandbox-focused worker tests
        run: swift test --filter 'testScriptTimesOut|testScriptTimeoutReaps|testSandboxedRunner'
