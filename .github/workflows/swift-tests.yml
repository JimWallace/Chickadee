name: Swift Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core-tests:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Run CoreTests
        run: swift test --parallel --filter CoreTests

  api-tests:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Install system test dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends zip unzip

      - name: Run APITests
        run: swift test --parallel --filter APITests

  worker-tests:
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Run WorkerTests
        run: swift test --filter WorkerTests
