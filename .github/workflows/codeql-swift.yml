name: CodeQL (Swift)

# CodeQL Swift analysis is macOS-only (CodeQL 2.25 constraint).
# Uses buildless extraction (build-mode: none) — required because the
# project depends on swift-foundation APIs (e.g. `Data.bytes`) that are
# not present in Apple's Darwin Foundation, so `swift build` cannot
# succeed on macOS even with the right toolchain. Buildless extraction
# is marked experimental by CodeQL and may produce less complete
# results than tracing extraction, but it dodges the toolchain gap and
# completes in a couple of minutes.
on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/codeql-swift.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/codeql-swift.yml'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
