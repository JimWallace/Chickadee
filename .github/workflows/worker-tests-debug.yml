name: Worker Tests Debug

on:
  workflow_dispatch:

jobs:
  worker-tests-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: full-worker-suite
            command: timeout --signal=TERM 4m swift test --skip-build --filter WorkerTests
          - name: unsandboxed-timeout
            command: timeout --signal=TERM 2m swift test --skip-build --filter WorkerTests/testScriptTimesOut
          - name: unsandboxed-timeout-child
            command: timeout --signal=TERM 2m swift test --skip-build --filter WorkerTests/testScriptTimeoutReapsBackgroundChildProcess
          - name: sandboxed-timeout
            command: timeout --signal=TERM 2m swift test --skip-build --filter WorkerTests/testSandboxedRunnerTimesOut
          - name: sandboxed-timeout-child
            command: timeout --signal=TERM 2m swift test --skip-build --filter WorkerTests/testSandboxedRunnerTimeoutReapsBackgroundChildProcess
          - name: sandboxed-network
            command: timeout --signal=TERM 2m swift test --skip-build --filter WorkerTests/testSandboxedRunnerBlocksNetworkAccess
    name: ${{ matrix.name }}
    container:
      image: swift:6.0-jammy
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Build tests
        run: swift build --build-tests

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
