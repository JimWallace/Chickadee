# Chickadee — Docker Compose
#
# Quick start (local / dev):
#   cp .env.example .env
#   # Edit .env for auth / URL settings as needed
#   docker compose up -d
#   open http://localhost:8080
#
# Production (with nginx + HTTPS):
#   - Set PUBLIC_BASE_URL, ENFORCE_HTTPS, SESSION_COOKIE_SECURE in .env
#   - Uncomment the nginx service below and remove the "8080:8080" port mapping
#   - Follow the Let's Encrypt instructions in deploy/README.md
#
# Scaling the runner:
#   docker compose up -d --scale runner=3

services:

  # ----------------------------------------------------------------
  # Server — Vapor API + Leaf web UI
  # ----------------------------------------------------------------
  server:
    build: .                              # used by `docker compose up --build` (local dev)
    image: ghcr.io/jimwallace/chickadee:latest  # pulled by `docker compose pull` (production)
    restart: unless-stopped
    ports:
      - "8080:8080"   # remove this if using the nginx service below
    volumes:
      - chickadee-data:/data
    environment:
      # Auth mode: "local" uses username/password (good for dev and self-hosted).
      # Switch to "sso" or "dual" and fill in OIDC_* vars for SSO.
      AUTH_MODE:                    ${AUTH_MODE:-local}
      ENABLE_NON_SSO_AUTH_MODES:    ${ENABLE_NON_SSO_AUTH_MODES:-true}

      # Database backend:
      #   - Leave unset (or set DATABASE_BACKEND=sqlite) to keep the default SQLite path.
      #   - To use PostgreSQL, uncomment the optional db service below and set:
      #       DATABASE_BACKEND=postgres
      #       DATABASE_HOST=db
      #       DATABASE_PORT=5432
      #       DATABASE_NAME=chickadee
      #       DATABASE_USER=chickadee
      #       DATABASE_PASSWORD=change-me
      DATABASE_BACKEND:             ${DATABASE_BACKEND:-sqlite}
      SQLITE_PATH:                  ${SQLITE_PATH:-}
      DATABASE_HOST:                ${DATABASE_HOST:-}
      DATABASE_PORT:                ${DATABASE_PORT:-}
      DATABASE_NAME:                ${DATABASE_NAME:-}
      DATABASE_USER:                ${DATABASE_USER:-}
      DATABASE_PASSWORD:            ${DATABASE_PASSWORD:-}

      # Public URL — set to your domain in production (e.g. https://chickadee.example.com)
      PUBLIC_BASE_URL:              ${PUBLIC_BASE_URL:-}
      ENFORCE_HTTPS:                ${ENFORCE_HTTPS:-false}
      SESSION_COOKIE_SECURE:        ${SESSION_COOKIE_SECURE:-false}

      # OIDC / SSO — only needed when AUTH_MODE=sso or dual
      OIDC_AUTH_SERVER:             ${OIDC_AUTH_SERVER:-}
      OIDC_CLIENT_ID:               ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET:           ${OIDC_CLIENT_SECRET:-}
      OIDC_CALLBACK:                ${OIDC_CALLBACK:-}
      OIDC_USERNAME_CLAIM:          ${OIDC_USERNAME_CLAIM:-}
      OIDC_EMAIL_CLAIM:             ${OIDC_EMAIL_CLAIM:-}
      SSO_ADMIN_USERS:              ${SSO_ADMIN_USERS:-}
      SSO_INSTRUCTOR_USERS:         ${SSO_INSTRUCTOR_USERS:-}

      # BrightSpace grade sync — leave unset to disable
      BRIGHTSPACE_URL:              ${BRIGHTSPACE_URL:-}
      BRIGHTSPACE_CLIENT_ID:        ${BRIGHTSPACE_CLIENT_ID:-}
      BRIGHTSPACE_CLIENT_SECRET:    ${BRIGHTSPACE_CLIENT_SECRET:-}
      BRIGHTSPACE_SYNC_DEBOUNCE_SECS: ${BRIGHTSPACE_SYNC_DEBOUNCE_SECS:-}

      LOG_LEVEL:                    ${LOG_LEVEL:-info}
    networks:
      - chickadee
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # Runner — polls the server for pending jobs and runs test scripts
  # ----------------------------------------------------------------
  runner:
    image: ghcr.io/jimwallace/chickadee:latest
    entrypoint: ["/bin/sh", "-lc"]
    volumes:
      - chickadee-data:/data:ro
    command:
      - >
        exec /app/chickadee-runner
        --api-base-url http://server:8080
        --worker-id "${RUNNER_WORKER_ID:-runner-${HOSTNAME}}"
        --max-jobs "${RUNNER_MAX_JOBS:-4}"
      # Note: --sandbox is intentionally omitted here.
      # Docker already provides container-level process isolation.
      # To enable OS-level sandboxing (Linux unshare namespaces),
      # add "--sandbox" here and "cap_add: [SYS_ADMIN]" to this service.
    environment:
    networks:
      - chickadee
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------------
  # db — optional PostgreSQL service
  #
  # Leave this commented out to keep the default SQLite deployment path.
  # To enable PostgreSQL:
  #   1. Uncomment this service.
  #   2. Set DATABASE_BACKEND=postgres on the server service.
  #   3. Set DATABASE_HOST=db and the matching DATABASE_* credentials.
  # ----------------------------------------------------------------
  # db:
  #   image: postgres:16
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: chickadee
  #     POSTGRES_USER: chickadee
  #     POSTGRES_PASSWORD: change-me
  #   volumes:
  #     - chickadee-postgres:/var/lib/postgresql/data
  #   networks:
  #     - chickadee
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U chickadee -d chickadee"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ----------------------------------------------------------------
  # nginx — reverse proxy with JupyterLite headers
  #
  # Uncomment to use nginx instead of exposing :8080 directly.
  # Also remove the "8080:8080" port mapping from the server service.
  # ----------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/chickadee.conf:ro
  #     - certbot-certs:/etc/letsencrypt:ro
  #     - certbot-www:/var/www/certbot:ro
  #   depends_on:
  #     - server
  #   networks:
  #     - chickadee

volumes:
  chickadee-data:   # SQLite database, submissions, test setups, results
  chickadee-postgres: # PostgreSQL data directory when using the optional db service
  certbot-certs:    # TLS certificates (populated by certbot — see deploy/README.md)
  certbot-www:      # ACME HTTP-01 challenge webroot

networks:
  chickadee:
    driver: bridge
